<!DOCTYPE html>
<html lang="he" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONLINK • Speed Dial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
        
        .tail-container { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }

        .neon-glow {
            text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff, 0 0 40px #00f5ff;
        }

        .futuristic-frame {
            position: relative;
            border: 2px solid transparent;
            background: linear-gradient(#111827, #111827) padding-box,
                        linear-gradient(90deg, #00f5ff, #ff00ff, #00ff9f, #00f5ff) border-box;
            background-size: 300% 300%;
            animation: gradient-shift 8s linear infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .category-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-btn:hover {
            transform: scale(1.08) translateY(-8px);
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white min-h-screen" dir="rtl">
    <div id="main-app" class="max-w-md mx-auto futuristic-frame rounded-3xl overflow-hidden shadow-2xl shadow-cyan-500/30 h-screen flex flex-col">

        <!-- מסך קטגוריות ראשי -->
        <div id="category-screen">
            <div class="bg-black/80 backdrop-blur-xl border-b border-cyan-500/30 px-6 py-8">
                <h1 class="title-font text-4xl font-bold tracking-tighter neon-glow text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-emerald-400 text-center">
                    NEONLINK
                </h1>
                <p class="text-center text-cyan-300/70 mt-1">בחר קטגוריה</p>
            </div>

            <div id="category-grid" class="p-6 grid grid-cols-2 gap-5 overflow-auto flex-1">
                <!-- יימלא ע"י JS -->
            </div>

            <div class="p-6 border-t border-zinc-800">
                <button onclick="addNewCategory()" 
                        class="w-full py-5 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 hover:brightness-110">
                    <i class="fa-solid fa-plus"></i> הוסף קטגוריה חדשה
                </button>
            </div>
        </div>

        <!-- מסך אנשי קשר -->
        <div id="contacts-screen" class="hidden flex-col h-full">
            <div class="bg-black/80 backdrop-blur-xl border-b border-cyan-500/30 px-6 py-5 flex items-center gap-4">
                <button onclick="backToCategories()" class="text-3xl text-cyan-400">←</button>
                <h2 id="current-category-title" class="title-font text-2xl font-bold"></h2>
            </div>

            <div id="contacts-container" class="flex-1 overflow-auto p-4 space-y-6 bg-zinc-950">
                <!-- יימלא ע"י JS -->
            </div>

            <!-- כפתורי פעולה -->
            <div class="fixed bottom-8 right-8 flex flex-col gap-3 z-50">
                <button onclick="importFromContacts()" 
                        class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-2xl flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                    <i class="fa-solid fa-address-book text-3xl"></i>
                </button>
                <button onclick="showAddModal()" 
                        class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                    <i class="fa-solid fa-plus text-3xl"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- מודל הוספה / עריכה -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="modal bg-zinc-900 rounded-3xl w-[92%] max-w-sm p-6 futuristic-frame">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6 title-font">הוסף איש קשר</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">שם</label>
                    <input id="name" type="text" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">מספר טלפון</label>
                    <input id="phone" type="tel" placeholder="+972 50-123-4567" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">קטגוריה</label>
                    <select id="category" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg"></select>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">ביטול</button>
                <button onclick="saveContact()" class="flex-1 py-4 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-2xl font-semibold">שמור</button>
            </div>
        </div>
    </div>

    <script>
        let contacts = [];
        let categories = ["All", "Family", "Work", "Friends", "Other"];
        
        const categoryConfig = {
            "All":     { icon: "🌐", color: "from-zinc-700 to-zinc-800", accent: "#67e8f9" },
            "Family":  { icon: "👨‍👩‍👧‍👦", color: "from-pink-600 to-rose-600", accent: "#f472b6" },
            "Work":    { icon: "💼", color: "from-blue-600 to-cyan-600", accent: "#22d3ee" },
            "Friends": { icon: "👥", color: "from-violet-600 to-purple-600", accent: "#a78bfa" },
            "Other":   { icon: "⭐", color: "from-amber-600 to-orange-600", accent: "#fbbf24" }
        };

        let currentCategory = null;
        let editingId = null;

        function loadData() {
            const savedContacts = localStorage.getItem('neonlink_contacts');
            const savedCats = localStorage.getItem('neonlink_categories');
            contacts = savedContacts ? JSON.parse(savedContacts) : [];
            categories = savedCats ? JSON.parse(savedCats) : categories;
            renderCategoryScreen();
        }

        function saveData() {
            localStorage.setItem('neonlink_contacts', JSON.stringify(contacts));
            localStorage.setItem('neonlink_categories', JSON.stringify(categories));
        }

        function renderCategoryScreen() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';

            categories.forEach(cat => {
                const config = categoryConfig[cat] || { icon: "📁", color: "from-zinc-700 to-zinc-800", accent: "#67e8f9" };
                const btn = document.createElement('div');
                btn.className = `category-btn bg-gradient-to-br ${config.color} border border-white/20 rounded-3xl p-8 cursor-pointer text-center shadow-xl`;
                btn.innerHTML = `
                    <div class="text-6xl mb-4">${config.icon}</div>
                    <div class="font-semibold text-2xl">${cat === "All" ? "הכל" : cat}</div>
                `;
                btn.onclick = () => openCategory(cat);
                grid.appendChild(btn);
            });
        }

        function openCategory(cat) {
            currentCategory = cat;
            document.getElementById('category-screen').classList.add('hidden');
            document.getElementById('contacts-screen').classList.remove('hidden');
            document.getElementById('current-category-title').textContent = cat === "All" ? "כל אנשי הקשר" : cat;
            renderContacts();
        }

        function backToCategories() {
            document.getElementById('contacts-screen').classList.add('hidden');
            document.getElementById('category-screen').classList.remove('hidden');
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';

            const filtered = currentCategory === "All" 
                ? contacts 
                : contacts.filter(c => c.category === currentCategory);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-center py-20 text-zinc-500">
                        <p class="text-6xl mb-4">📭</p>
                        <p class="text-xl">אין אנשי קשר בקטגוריה זו</p>
                    </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 gap-4';

            filtered.forEach(contact => {
                const config = categoryConfig[contact.category] || categoryConfig["Other"];
                const div = document.createElement('div');
                div.className = `contact-btn bg-zinc-900 border border-white/10 rounded-3xl p-5 cursor-pointer group relative overflow-hidden`;
                div.style.borderColor = config.accent + '40';
                
                div.innerHTML = `
                    <div onclick="makeCall('${contact.phone}')" class="text-center">
                        <div class="w-20 h-20 mx-auto bg-gradient-to-br ${config.color} rounded-3xl flex items-center justify-center text-4xl mb-4 shadow-inner">
                            ${contact.name[0].toUpperCase()}
                        </div>
                        <div class="font-medium text-lg">${contact.name}</div>
                        <div class="text-sm font-mono mt-1" style="color: \( {config.accent}"> \){contact.phone}</div>
                    </div>
                    <div class="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                        <button onclick="editContact('${contact.id}'); event.stopImmediatePropagation();" 
                                class="w-8 h-8 bg-black/70 hover:bg-blue-600 rounded-2xl flex items-center justify-center">✏️</button>
                        <button onclick="deleteContact('${contact.id}'); event.stopImmediatePropagation();" 
                                class="w-8 h-8 bg-black/70 hover:bg-red-600 rounded-2xl flex items-center justify-center">🗑</button>
                    </div>
                `;
                grid.appendChild(div);
            });
            container.appendChild(grid);
        }

        function makeCall(phone) {
            window.location.href = `tel:${phone}`;
        }

        async function importFromContacts() {
            if (!('contacts' in navigator)) {
                alert("Contact Picker לא נתמך בדפדפן זה.\nמומלץ להשתמש ב-Chrome באנדרואיד.");
                return;
            }
            try {
                const selected = await navigator.contacts.select(["name", "tel"], { multiple: true });
                let added = 0;
                selected.forEach(c => {
                    if (c.tel && c.tel.length > 0) {
                        const name = c.name?.[0] || "Unknown";
                        const phone = c.tel[0].replace(/\s+/g, '');
                        if (!contacts.some(ex => ex.phone === phone)) {
                            contacts.push({
                                id: 'c_' + Date.now() + added,
                                name: name,
                                phone: phone,
                                category: currentCategory !== "All" ? currentCategory : "Other"
                            });
                            added++;
                        }
                    }
                });
                if (added > 0) {
                    saveData();
                    renderContacts();
                    alert(`✅ נוספו ${added} אנשי קשר`);
                }
            } catch (e) {
                alert("הבחירה בוטלה");
            }
        }

        function showAddModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = "הוסף איש קשר";
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            updateCategorySelect();
            document.getElementById('modal').classList.remove('hidden');
        }

        function editContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (!contact) return;
            editingId = id;
            document.getElementById('modal-title').textContent = "ערוך איש קשר";
            document.getElementById('name').value = contact.name;
            document.getElementById('phone').value = contact.phone;
            updateCategorySelect(contact.category);
            document.getElementById('modal').classList.remove('hidden');
        }

        function updateCategorySelect(selected = null) {
            const select = document.getElementById('category');
            select.innerHTML = '';
            categories.forEach(cat => {
                if (cat === "All") return;
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                if (cat === selected) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function saveContact() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const category = document.getElementById('category').value;

            if (!name || !phone) {
                alert("יש למלא שם ומספר טלפון");
                return;
            }

            if (editingId) {
                const contact = contacts.find(c => c.id === editingId);
                if (contact) {
                    contact.name = name;
                    contact.phone = phone;
                    contact.category = category;
                }
            } else {
                contacts.push({
                    id: 'c_' + Date.now(),
                    name: name,
                    phone: phone,
                    category: category
                });
            }

            saveData();
            hideModal();
            renderContacts();
        }

        function deleteContact(id) {
            if (confirm("למחוק איש קשר זה?")) {
                contacts = contacts.filter(c => c.id !== id);
                saveData();
                renderContacts();
            }
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function addNewCategory() {
            const name = prompt("שם הקטגוריה החדשה:");
            if (name && name.trim()) {
                const newCat = name.trim();
                if (!categories.includes(newCat)) {
                    categories.push(newCat);
                    saveData();
                    renderCategoryScreen();
                } else {
                    alert("קטגוריה כזו כבר קיימת");
                }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
