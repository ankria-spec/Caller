<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONLINK • Speed Dial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
        
        .tail-container { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }

        .neon-glow {
            text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff, 0 0 40px #00f5ff;
        }

        .futuristic-frame {
            position: relative;
            border: 2px solid transparent;
            background: linear-gradient(#111827, #111827) padding-box,
                        linear-gradient(90deg, #00f5ff, #ff00ff, #00ff9f, #00f5ff) border-box;
            background-size: 300% 300%;
            animation: gradient-shift 8s linear infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .contact-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .contact-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 30px -4px rgb(0 245 255);
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white min-h-screen pb-24">
    <div class="max-w-md mx-auto futuristic-frame rounded-3xl overflow-hidden shadow-2xl shadow-cyan-500/30 h-screen flex flex-col">
        
        <!-- HEADER -->
        <div class="bg-black/80 backdrop-blur-xl border-b border-cyan-500/30 px-6 py-5 flex items-center justify-between">
            <div>
                <h1 class="title-font text-3xl font-bold tracking-tighter neon-glow text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-emerald-400">
                    NEONLINK
                </h1>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex border-b border-zinc-800 bg-zinc-900/70 overflow-x-auto">
            <button onclick="switchTab(0)" id="tab-0" class="category-tab active flex-1 py-4 text-sm font-medium text-cyan-400 whitespace-nowrap px-4">ALL</button>
            <button onclick="switchTab(1)" id="tab-1" class="category-tab flex-1 py-4 text-sm font-medium whitespace-nowrap px-4">FAMILY</button>
            <button onclick="switchTab(2)" id="tab-2" class="category-tab flex-1 py-4 text-sm font-medium whitespace-nowrap px-4">WORK</button>
            <button onclick="switchTab(3)" id="tab-3" class="category-tab flex-1 py-4 text-sm font-medium whitespace-nowrap px-4">FRIENDS</button>
            <button onclick="switchTab(4)" id="tab-4" class="category-tab flex-1 py-4 text-sm font-medium whitespace-nowrap px-4">OTHER</button>
        </div>

        <!-- CONTACTS -->
        <div id="contacts-container" class="flex-1 overflow-auto p-4 space-y-6 bg-zinc-950">
            <!-- Populated by JS -->
        </div>

        <!-- FLOATING BUTTONS -->
        <div class="fixed bottom-8 right-8 flex flex-col gap-3 z-50">
            <button onclick="importFromContacts()" class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-2xl flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                <i class="fa-solid fa-address-book text-3xl"></i>
            </button>
            <button onclick="showAddModal()" class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                <i class="fa-solid fa-plus text-3xl"></i>
            </button>
        </div>
    </div>

    <!-- ADD / EDIT MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="modal bg-zinc-900 rounded-3xl w-[92%] max-w-sm p-6 futuristic-frame">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6 title-font">ADD CONTACT</h2>
            <div class="space-y-5">
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">Name</label>
                    <input id="name" type="text" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">Phone Number</label>
                    <input id="phone" type="tel" placeholder="+1234567890" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg">
                </div>
                <div>
                    <label class="text-xs uppercase tracking-widest text-zinc-400 block mb-1">Category</label>
                    <select id="category" class="w-full bg-zinc-800 border border-zinc-700 focus:border-cyan-400 rounded-2xl px-5 py-4 outline-none text-lg">
                        <option value="Family">Family</option>
                        <option value="Work">Work</option>
                        <option value="Friends">Friends</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">CANCEL</button>
                <button onclick="saveContact()" class="flex-1 py-4 bg-gradient-to-r from-cyan-400 to-purple-500 rounded-2xl font-semibold">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        let contacts = [];
        let currentTab = 0;
        let editingId = null;

        function loadContacts() {
            const saved = localStorage.getItem('neonlink_contacts');
            contacts = saved ? JSON.parse(saved) : [];
            renderContacts();
        }

        function saveContacts() {
            localStorage.setItem('neonlink_contacts', JSON.stringify(contacts));
        }

        async function importFromContacts() {
            if (!('contacts' in navigator)) {
                alert("Contact Picker not supported.\nBest on Android Chrome.");
                return;
            }
            try {
                const selected = await navigator.contacts.select(["name", "tel"], { multiple: true });
                let added = 0;
                selected.forEach(c => {
                    if (c.tel && c.tel.length > 0) {
                        const name = c.name?.[0] || "Unknown";
                        const phone = c.tel[0].replace(/\s+/g, '');
                        if (!contacts.some(ex => ex.phone === phone)) {
                            contacts.push({ id: 'c_' + Date.now() + added, name, phone, category: "Other" });
                            added++;
                        }
                    }
                });
                if (added > 0) {
                    saveContacts();
                    renderContacts();
                    alert(`✅ Imported ${added} contacts! Go to OTHER tab and tap to edit category.`);
                }
            } catch (e) {
                alert("Selection cancelled.");
            }
        }

        function renderContacts() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = '';

            const filtered = currentTab === 0 
                ? contacts 
                : contacts.filter(c => c.category === ["All","Family","Work","Friends","Other"][currentTab]);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-center py-20 text-zinc-500">
                    <i class="fa-solid fa-address-book text-6xl mb-6 opacity-30"></i>
                    <p class="text-lg">No contacts yet</p>
                </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 gap-4';

            filtered.forEach(contact => {
                const div = document.createElement('div');
                div.className = `contact-btn bg-zinc-900 border border-zinc-700 hover:border-cyan-400 rounded-3xl p-5 cursor-pointer group`;
                div.innerHTML = `
                    <div onclick="makeCall('${contact.phone}')" class="text-center">
                        <div class="w-16 h-16 mx-auto bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl mb-4 shadow-inner">
                            ${contact.name[0].toUpperCase()}
                        </div>
                        <div class="font-medium text-lg">${contact.name}</div>
                        <div class="text-cyan-400 text-sm font-mono mt-1">${contact.phone}</div>
                    </div>
                    <div class="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                        <button onclick="editContact('${contact.id}'); event.stopImmediatePropagation();" class="w-8 h-8 bg-zinc-800 hover:bg-blue-600 rounded-xl flex items-center justify-center">
                            <i class="fa-solid fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteContact('${contact.id}'); event.stopImmediatePropagation();" class="w-8 h-8 bg-zinc-800 hover:bg-red-600 rounded-xl flex items-center justify-center">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(div);
            });
            container.appendChild(grid);
        }

        function makeCall(phone) {
            window.location.href = `tel:${phone}`;
        }

        function showAddModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = "ADD CONTACT";
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('category').value = 'Other';
            document.getElementById('modal').classList.remove('hidden');
        }

        function editContact(id) {
            const contact = contacts.find(c => c.id === id);
            if (!contact) return;
            editingId = id;
            document.getElementById('modal-title').textContent = "EDIT CONTACT";
            document.getElementById('name').value = contact.name;
            document.getElementById('phone').value = contact.phone;
            document.getElementById('category').value = contact.category;
            document.getElementById('modal').classList.remove('hidden');
        }

        function saveContact() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const category = document.getElementById('category').value;

            if (!name || !phone) {
                alert("Name and phone number are required");
                return;
            }

            if (editingId) {
                const contact = contacts.find(c => c.id === editingId);
                if (contact) {
                    contact.name = name;
                    contact.phone = phone;
                    contact.category = category;
                }
            } else {
                contacts.push({
                    id: 'c_' + Date.now(),
                    name: name,
                    phone: phone,
                    category: category
                });
            }

            saveContacts();
            hideModal();
            renderContacts();
        }

        function deleteContact(id) {
            if (confirm("Delete this contact?")) {
                contacts = contacts.filter(c => c.id !== id);
                saveContacts();
                renderContacts();
            }
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function switchTab(tabIndex) {
            currentTab = tabIndex;
            document.querySelectorAll('.category-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === tabIndex);
                tab.classList.toggle('text-cyan-400', i === tabIndex);
            });
            renderContacts();
        }

        window.onload = () => {
            loadContacts();
            if (contacts.length === 0) {
                contacts = [{ id: "demo1", name: "Mom", phone: "+1234567890", category: "Family" }];
                saveContacts();
            }
            renderContacts();
        };
    </script>
</body>
</html>
